<svg width="1200" height="500" viewBox="0 0 1200 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Arhaam Atiq — AI engineer, founder, and org builder">
  <title>Arhaam Atiq — AI engineer, founder, and org builder</title>
  <defs>
    <linearGradient id="hbg" x1="0" y1="0" x2="1200" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#090c13"/>
      <stop offset="100%" stop-color="#0e1320"/>
    </linearGradient>
    <pattern id="hdots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1a2332" opacity="0.9"/>
    </pattern>
    <linearGradient id="hname" x1="80" y1="155" x2="600" y2="215" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="60%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="500" fill="url(#hbg)"/>
  <rect width="1200" height="500" fill="url(#hdots)" opacity="0.4"/>

  <ellipse cx="970" cy="100" rx="320" ry="220" fill="#1e40af" opacity="0.04"/>
  <ellipse cx="80"  cy="480" rx="240" ry="160" fill="#4338ca" opacity="0.04"/>

  <!-- ── Left: Identity ── -->

  <!-- Status badge -->
  <rect x="80" y="64" width="190" height="28" rx="14" fill="#052e16" stroke="#166534" stroke-width="1"/>
  <circle cx="99" cy="78" r="4.5" fill="#22c55e">
    <animate attributeName="opacity" values="0.35;1;0.35" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="113" y="83" font-family="Inter,-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" font-weight="600" fill="#4ade80">open to opportunities</text>

  <!-- Name -->
  <text x="80" y="188" font-family="Inter,-apple-system,BlinkMacSystemFont,sans-serif" font-size="70" font-weight="900" letter-spacing="-2" fill="url(#hname)">Arhaam Atiq</text>

  <!-- Role -->
  <text x="80" y="232" font-family="Inter,-apple-system,BlinkMacSystemFont,sans-serif" font-size="19" font-weight="400" fill="#94a3b8">AI engineer · founder · org builder</text>

  <!-- School -->
  <text x="80" y="264" font-family="Inter,-apple-system,BlinkMacSystemFont,sans-serif" font-size="14" fill="#475569">CS + Applied Math @ SJSU</text>

  <!-- Skill pills -->
  <rect x="80"  y="292" width="106" height="26" rx="13" fill="#0c1118" stroke="#1e293b" stroke-width="1.2"/>
  <text x="133" y="309.5" font-family="Inter,-apple-system,sans-serif" font-size="11.5" font-weight="600" fill="#94a3b8" text-anchor="middle">Full-Stack AI</text>

  <rect x="194" y="292" width="50" height="26" rx="13" fill="#0c1118" stroke="#1e293b" stroke-width="1.2"/>
  <text x="219" y="309.5" font-family="Inter,-apple-system,sans-serif" font-size="11.5" font-weight="600" fill="#94a3b8" text-anchor="middle">RAG</text>

  <rect x="252" y="292" width="52" height="26" rx="13" fill="#0c1118" stroke="#1e293b" stroke-width="1.2"/>
  <text x="278" y="309.5" font-family="Inter,-apple-system,sans-serif" font-size="11.5" font-weight="600" fill="#94a3b8" text-anchor="middle">MCP</text>

  <rect x="312" y="292" width="140" height="26" rx="13" fill="#0c1118" stroke="#1e293b" stroke-width="1.2"/>
  <text x="382" y="309.5" font-family="Inter,-apple-system,sans-serif" font-size="11.5" font-weight="600" fill="#94a3b8" text-anchor="middle">Agentic Pipelines</text>

  <rect x="460" y="292" width="108" height="26" rx="13" fill="#0c1118" stroke="#1e293b" stroke-width="1.2"/>
  <text x="514" y="309.5" font-family="Inter,-apple-system,sans-serif" font-size="11.5" font-weight="600" fill="#94a3b8" text-anchor="middle">Eval Systems</text>

  <!-- Stat cards -->
  <rect x="80"  y="338" width="162" height="72" rx="11" fill="#080b11" stroke="#1a2332" stroke-width="1.2"/>
  <text x="100" y="367" font-family="Inter,-apple-system,sans-serif" font-size="24" font-weight="800" fill="#f1f5f9">99.5%</text>
  <text x="100" y="389" font-family="Inter,-apple-system,sans-serif" font-size="11" fill="#475569">recall · AgentGate evals</text>

  <rect x="254" y="338" width="162" height="72" rx="11" fill="#080b11" stroke="#1a2332" stroke-width="1.2"/>
  <text x="274" y="367" font-family="Inter,-apple-system,sans-serif" font-size="24" font-weight="800" fill="#f1f5f9">PyPI</text>
  <text x="274" y="389" font-family="Inter,-apple-system,sans-serif" font-size="11" fill="#475569">pip install agentgate-py</text>

  <rect x="428" y="338" width="162" height="72" rx="11" fill="#080b11" stroke="#1a2332" stroke-width="1.2"/>
  <text x="448" y="367" font-family="Inter,-apple-system,sans-serif" font-size="18" font-weight="800" fill="#f1f5f9">Applied Eng.</text>
  <text x="448" y="389" font-family="Inter,-apple-system,sans-serif" font-size="11" fill="#475569">SJSU software agency</text>

  <!-- ── Right: AgentGate Code Card ── -->

  <ellipse cx="898" cy="250" rx="180" ry="140" fill="#3b82f6" opacity="0.03"/>

  <!-- Card -->
  <rect x="632" y="42" width="520" height="416" rx="16" fill="#080b11" stroke="#1a2332" stroke-width="1.5"/>
  <!-- Title bar -->
  <rect x="632" y="42" width="520" height="46" rx="16" fill="#0c1018"/>
  <rect x="632" y="68" width="520" height="20" fill="#0c1018"/>
  <line x1="632" y1="88" x2="1152" y2="88" stroke="#1a2332" stroke-width="1"/>
  <!-- Traffic lights -->
  <circle cx="659" cy="65" r="5.5" fill="#ef4444" opacity="0.85"/>
  <circle cx="680" cy="65" r="5.5" fill="#f59e0b" opacity="0.85"/>
  <circle cx="701" cy="65" r="5.5" fill="#22c55e" opacity="0.85"/>
  <!-- Tab label -->
  <text x="892" y="70" text-anchor="middle" font-family="Inter,-apple-system,sans-serif" font-size="12" fill="#4b5563">agentgate / runtime.py</text>

  <!-- Code lines -->
  <g font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace" font-size="13">

    <!-- $ pip install agentgate-py -->
    <text x="654" y="116" fill="#6b7280">$</text>
    <text x="665" y="116" fill="#4ade80"> pip install agentgate-py</text>

    <!-- output -->
    <text x="654" y="140" fill="#374151">Successfully installed agentgate-py</text>

    <!-- separator -->
    <line x1="654" y1="158" x2="1132" y2="158" stroke="#1a2332" stroke-width="1" stroke-dasharray="3 6"/>

    <!-- from agentgate import Gate -->
    <text x="654" y="181">
      <tspan fill="#c084fc">from</tspan><tspan fill="#e2e8f0"> agentgate </tspan><tspan fill="#c084fc">import</tspan><tspan fill="#93c5fd"> Gate</tspan>
    </text>

    <!-- gate = Gate(policy="strict") -->
    <text x="654" y="227">
      <tspan fill="#e2e8f0">gate </tspan><tspan fill="#67e8f9">= </tspan><tspan fill="#7dd3fc">Gate</tspan><tspan fill="#e2e8f0">(policy=</tspan><tspan fill="#fca5a5">"strict"</tspan><tspan fill="#e2e8f0">)</tspan>
    </text>

    <!-- @gate.protect -->
    <text x="654" y="273" fill="#facc15">@gate.protect</text>

    <!-- async def run(task): -->
    <text x="654" y="297">
      <tspan fill="#c084fc">async def</tspan><tspan fill="#7dd3fc"> run</tspan><tspan fill="#e2e8f0">(task):</tspan>
    </text>

    <!-- indented return line (4 spaces ≈ 31px at 13px monospace) -->
    <text x="685" y="321">
      <tspan fill="#c084fc">return await </tspan><tspan fill="#7dd3fc">agent</tspan><tspan fill="#e2e8f0">.run(task)</tspan>
    </text>

    <!-- comments -->
    <text x="654" y="365" fill="#374151"># 99.5% recall  ·  97.7% precision</text>
    <text x="654" y="389" fill="#374151"># 370 adversarial eval scenarios</text>
    <text x="654" y="413" fill="#374151"># pip install agentgate-py</text>

    <!-- blinking cursor -->
    <rect x="654" y="424" width="7" height="16" fill="#4ade80" opacity="0.9">
      <animate attributeName="opacity" values="0;0;0.9;0.9" dur="1.2s" repeatCount="indefinite"/>
    </rect>

  </g>
</svg>
